# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Special step for Python 3.7
      if: matrix.python-version == '3.7'
      run: |
        echo "Performing special step for Python 3.7"
        git rm pygim-common/tests/unit_tests/magic/test_patch_py38_plus.py

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip wheel ./pygim-common --no-deps
        python -m pip wheel ./pygim-ddd --no-deps
        python -m pip install . -f .
        python -m pip install pytest

    - name: Test with pytest
      run: |
        pytest
