[project]
name = "pygim"
version = "0.1.0"
description = "Full Python Gimmicks project with all of its sub-projects."
readme = "README.rst"
requires-python = ">=3.7, <4"
authors = [
  {email = "debith-dev@outlook.com"},
  {name = "Teppo Perä"}
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.7",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Software Development :: Quality Assurance",
  "Typing :: Typed",
]

dependencies = [
  'pygim-common'
]

[project.optional-dependencies]
dev = [
  'pytest',
  'pytest-xdist',
  'mypy'
]

[tool.pytest.ini_options]
minversion = "6.0"
python_files = "test_*.py"
addopts = '-ra -q --doctest-glob="**/*.py" --tb=short --doctest-modules --doctest-continue-on-failure'
testpaths = [
    "pygim-common/tests"
]

[tool.coverage.paths]
source = ["pygim-common/pygim"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if False",
    "if __name__ == .__main__.:",
    "@abc.abstractmethod",
    "@abc.abstractproperty",
]

[tool.pygim.commands]
lint = "mypy ."
test = "pytest"
